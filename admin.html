<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإدارة الكاملة | متجر التطبيقات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .toggle-switch {
            position: relative;
            width: 50px;
            height: 26px;
            background: #ccc;
            border-radius: 9999px;
            cursor: pointer;
            transition: 0.3s;
            display: inline-block;
        }
        .toggle-switch.active { background: var(--success); }
        .toggle-switch::after {
            content: '';
            position: absolute;
            top: 3px;
            right: 3px;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            transition: 0.3s;
        }
        body[dir="rtl"] .toggle-switch::after { right: auto; left: 3px; }
        body[dir="rtl"] .toggle-switch.active::after { left: 27px; right: auto; }
        body[dir="ltr"] .toggle-switch.active::after { right: 27px; }
        .color-input { width: 60px; height: 40px; border: none; border-radius: 8px; cursor: pointer; }
        .tag-badge { padding: 4px 10px; background: var(--primary-light); border-radius: 9999px; font-size: 12px; color: var(--primary); font-weight: 600; display: inline-block; margin: 2px; }
        .section-card { background: var(--bg-glass); backdrop-filter: blur(20px); border-radius: var(--radius-lg); padding: 24px; border: 1.5px solid var(--border); margin-bottom: 24px; }
        .section-card h3 { margin-bottom: 16px; font-size: 20px; }
        .btn-danger { background: var(--gradient-red); color: white; padding: 14px; border-radius: var(--radius-md); font-weight: 700; width: 100%; }
        .btn-success { background: var(--gradient-green); color: white; }
        .badge { padding: 4px 12px; border-radius: 9999px; font-size: 12px; font-weight: 700; }
        .badge-active { background: var(--success); color: white; }
        .badge-inactive { background: var(--error); color: white; }
        .badge-featured { background: var(--warning); color: white; }
        .badge-free { background: var(--success); color: white; }
        .badge-paid { background: var(--primary); color: white; }
        .badge-admin { background: var(--gradient-red); color: white; }
        .badge-user { background: var(--gradient-blue); color: white; }
    </style>
</head>
<body dir="rtl">

<div class="admin-layout">
    <aside class="admin-sidebar">
        <div class="sidebar-logo">
            <div class="icon">⚙️</div>
            <span>الإدارة الشاملة</span>
        </div>
        <nav class="sidebar-nav">
            <a class="sidebar-link active" onclick="showSection('dashboard', this)"><span class="icon">📊</span> لوحة المعلومات</a>
            <a class="sidebar-link" onclick="showSection('apps', this)"><span class="icon">📱</span> التطبيقات</a>
            <a class="sidebar-link" onclick="showSection('categories', this)"><span class="icon">📂</span> الفئات</a>
            <a class="sidebar-link" onclick="showSection('coupons', this)"><span class="icon">🎫</span> الكوبونات</a>
            <a class="sidebar-link" onclick="showSection('users', this)"><span class="icon">👥</span> المستخدمون</a>
            <a class="sidebar-link" onclick="showSection('reviews', this)"><span class="icon">⭐</span> المراجعات</a>
            <a class="sidebar-link" onclick="showSection('orders', this)"><span class="icon">🛒</span> الطلبات</a>
            <a class="sidebar-link" onclick="showSection('settings', this)"><span class="icon">⚙️</span> إعدادات الموقع</a>
            <a class="sidebar-link" onclick="showSection('security', this)"><span class="icon">🔒</span> الأمان</a>
            <a class="sidebar-link" onclick="showSection('data', this)"><span class="icon">💾</span> البيانات</a>
            <hr style="border:0;border-top:1px solid rgba(255,255,255,0.1);margin:16px 0;">
            <a class="sidebar-link" onclick="window.location.href='index.html'"><span class="icon">🏠</span> المتجر</a>
            <a class="sidebar-link" onclick="doLogout()"><span class="icon">🚪</span> خروج</a>
        </nav>
    </aside>

    <main class="admin-main">
        <div class="admin-header">
            <h1 id="page-title">📊 لوحة المعلومات</h1>
            <div style="display:flex;gap:12px;align-items:center;">
                <span id="admin-name" style="color:var(--text-secondary);font-weight:600;"></span>
                <button class="lang-toggle" onclick="toggleLang()"><span id="lang-label">EN</span></button>
            </div>
        </div>

        <div id="content"></div>
    </main>
</div>

<div id="modal-container"></div>
<div class="toast" id="toast"></div>

<script src="data/apps-data.js"></script>

function showToast(msg, type = 'info') {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.className = 'toast ' + type + ' show';
    setTimeout(() => { toast.className = 'toast'; }, 3000);
}

function formatNumber(n) {
    if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
    if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
    return String(n);
}

function toggleLang() {
    currentLang = currentLang === 'ar' ? 'en' : 'ar';
    localStorage.setItem('lang', currentLang);
    document.body.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
    document.getElementById('lang-label').textContent = currentLang === 'ar' ? 'EN' : 'ع';
    showSection(currentSection, null);
}

function doLogout() {
    Security.clearSession();
    window.location.href = 'index.html';
}

// === التنقل بين الأقسام ===
let currentSection = 'dashboard';

function showSection(section, link) {
    if (!Security.requireAdmin()) { doLogout(); return; }
    currentSection = section;
    document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
    if (link) link.classList.add('active');

    const titles = {
        dashboard: '📊 لوحة المعلومات', apps: '📱 إدارة التطبيقات', categories: '📂 إدارة الفئات',
        coupons: '🎫 إدارة الكوبونات', users: '👥 إدارة المستخدمين', reviews: '⭐ المراجعات',
        orders: '🛒 الطلبات', settings: '⚙️ إعدادات الموقع', security: '🔒 الأمان', data: '💾 البيانات'
    };
    document.getElementById('page-title').textContent = titles[section] || '';

    const renderers = {
        dashboard: renderDashboard, apps: renderApps, categories: renderCategories,
        coupons: renderCoupons, users: renderUsers, reviews: renderReviews,
        orders: renderOrders, settings: renderSettings, security: renderSecurity, data: renderData
    };
    renderers[section]();
}

// === 1. لوحة المعلومات ===
function renderDashboard() {
    const apps = Store.loadApps();
    const settings = Store.loadSettings();
    const purchased = JSON.parse(localStorage.getItem('purchased') || '[]');
    const revenue = purchased.reduce((sum, id) => {
        const app = apps.find(a => a.id === id);
        return sum + (app ? app.price : 0);
    }, 0);
    const totalDl = apps.reduce((s, a) => s + (a.downloads || 0), 0);
    const currency = settings.currencySymbol || '$';

    document.getElementById('content').innerHTML = `
        <div class="admin-stats">
            <div class="stat-card"><div class="stat-icon">📱</div><div class="stat-value">${apps.length}</div><div class="stat-label">${t('total_apps')}</div></div>
            <div class="stat-card"><div class="stat-icon">💰</div><div class="stat-value">${purchased.length}</div><div class="stat-label">${t('total_sales')}</div></div>
            <div class="stat-card"><div class="stat-icon">💵</div><div class="stat-value">${currency}${revenue.toFixed(2)}</div><div class="stat-label">${t('total_revenue')}</div></div>
            <div class="stat-card"><div class="stat-icon">⬇️</div><div class="stat-value">${formatNumber(totalDl)}</div><div class="stat-label">${t('total_downloads')}</div></div>
        </div>
        <div class="admin-table">
            <table><thead><tr><th>📱 التطبيق</th><th>📂 الفئة</th><th>💰 السعر</th><th>⬇️ تحميلات</th><th>⭐ تقييم</th><th>📅 تاريخ</th></tr></thead>
            <tbody>${apps.sort((a,b)=>(b.downloads||0)-(a.downloads||0)).slice(0,15).map(a=>`
                <tr>
                    <td><strong>${a.icon||'📱'} ${Security.escapeHtml(a.name)}</strong></td>
                    <td>${getCatName(a.category)}</td>
                    <td>${a.price===0?'<span class="badge badge-free">مجاني</span>':'<span class="badge badge-paid">'+currency+a.price.toFixed(2)+'</span>'}</td>
                    <td>${formatNumber(a.downloads||0)}</td>
                    <td>${a.rating||'NEW'} ⭐</td>
                    <td>${a.updated||'-'}</td>
                </tr>
            `).join('')}</tbody></table>
        </div>
    `;
}

function getCatName(id) {
    const cat = Store.loadCategories().find(c => c.id === id);
    return cat ? (currentLang === 'ar' ? cat.name_ar : cat.name_en) : '-';
}

// === 2. إدارة التطبيقات ===
function renderApps() {
    const apps = Store.loadApps();
    const settings = Store.loadSettings();
    const currency = settings.currencySymbol || '$';
    document.getElementById('content').innerHTML = `
        <div style="margin-bottom:24px;display:flex;gap:12px;flex-wrap:wrap;">
            <button class="btn-primary" style="width:auto;padding:14px 28px;" onclick="openAppEditor()">➕ ${t('add_app')}</button>
        </div>
        <div class="admin-table">
            <table><thead><tr>
                <th>📱 التطبيق</th><th>📂 الفئة</th><th>💰 السعر</th><th>⬇️ تحميلات</th>
                <th>✅ الحالة</th><th>⭐ مميز</th><th>⚙️ ${t('actions')}</th>
            </tr></thead><tbody>
            ${apps.map(a => {
                const isOrig = APPS.some(o => o.id === a.id);
                return `
                <tr>
                    <td>
                        <div style="display:flex;align-items:center;gap:10px;">
                            ${a.iconData ? `<img src="${a.iconData}" style="width:40px;height:40px;border-radius:8px;object-fit:cover;">` : `<div style="width:40px;height:40px;background:var(--gradient-primary);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;">${a.icon||'📱'}</div>`}
                            <div><div style="font-weight:700;">${Security.escapeHtml(a.name)}</div>
                            <div style="font-size:11px;color:var(--text-secondary);">${Security.escapeHtml(a.developer||'')} ${isOrig?'(أصلي)':'(مخصص)'}</div></div>
                        </div>
                    </td>
                    <td>${getCatName(a.category)}</td>
                    <td>${a.price===0?'<span class="badge badge-free">مجاني</span>':'<span class="badge badge-paid">'+currency+a.price.toFixed(2)+'</span>'}</td>
                    <td>${formatNumber(a.downloads||0)}</td>
                    <td><span class="badge ${a.active===false?'badge-inactive':'badge-active'}">${a.active===false?t('inactive'):t('active')}</span></td>
                    <td>${a.featured?'<span class="badge badge-featured">⭐</span>':'-'}</td>
                    <td style="white-space:nowrap;">
                        <button class="action-btn edit" onclick="openAppEditor(${a.id})">✏️</button>
                        <button class="action-btn" style="background:var(--warning);color:white;" onclick="toggleFeatured(${a.id})">⭐</button>
                        <button class="action-btn" style="background:var(--info);color:white;" onclick="toggleActive(${a.id})">${a.active===false?'✅':'⏸️'}</button>
                        <button class="action-btn" style="background:${a.price===0?'var(--primary)':'var(--success)'};color:white;" onclick="togglePrice(${a.id})">${a.price===0?'💰':'🆓'}</button>
                        <button class="action-btn delete" onclick="deleteAppConfirm(${a.id})">🗑️</button>
                    </td>
                </tr>`;
            }).join('')}
            </tbody></table>
        </div>
    `;
}

function toggleFeatured(id) {
    const apps = Store.loadApps();
    const app = apps.find(a => a.id === id);
    if (app) { app.featured = !app.featured; Store.saveApp(app); showToast(t('saved'),'success'); renderApps(); }
}

function toggleActive(id) {
    const apps = Store.loadApps();
    const app = apps.find(a => a.id === id);
    if (app) { app.active = app.active === false ? true : false; Store.saveApp(app); showToast(t('saved'),'success'); renderApps(); }
}

function togglePrice(id) {
    const apps = Store.loadApps();
    const app = apps.find(a => a.id === id);
    if (app) {
        if (app.price === 0) {
            const newPrice = prompt(currentLang==='ar'?'أدخل السعر بالدولار:':'Enter price ($):', '9.99');
            if (newPrice !== null && Security.validatePrice(newPrice)) {
                app.price = parseFloat(newPrice);
                Store.saveApp(app); showToast(t('saved'),'success');
            }
        } else {
            app.price = 0;
            Store.saveApp(app); showToast(t('saved'),'success');
        }
        renderApps();
    }
}

function deleteAppConfirm(id) {
    if (!confirm(t('confirm_delete'))) return;
    Store.deleteApp(id);
    showToast(t('deleted'),'success');
    renderApps();
}

// === محرر التطبيق ===
let uploadedFileData = null, uploadedIconData = null;

    const apps = Store.loadApps();
    const cats = Store.loadCategories();
    const app = id ? apps.find(a => a.id === id) : null;
    uploadedFileData = null;
    uploadedIconData = null;

    document.getElementById('modal-container').innerHTML = `
        <div class="modal-overlay active" onclick="if(event.target===this)closeModal()">
            <div class="modal" style="max-width:700px;max-height:90vh;overflow-y:auto;">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
                    <h2>${app?'✏️ '+t('edit_app'):'➕ '+t('add_app')}</h2>
                    <button onclick="closeModal()" style="font-size:24px;">✕</button>
                </div>
                <form onsubmit="saveAppForm(event, ${id||'null'})">
                    <div class="form-row">
                        <div class="form-group"><label>${t('app_name')} *</label>
                        <input type="text" id="f-name" required value="${app?Security.escapeHtml(app.name):''}"></div>
                        <div class="form-group"><label>${t('developer')}</label>
                        <input type="text" id="f-dev" value="${app?Security.escapeHtml(app.developer||''):''}"></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>${t('category')} *</label>
                        <select id="f-cat" required>
                            ${cats.map(c=>`<option value="${c.id}" ${app&&app.category===c.id?'selected':''}>${c.icon} ${currentLang==='ar'?c.name_ar:c.name_en}</option>`).join('')}
                        </select></div>
                        <div class="form-group"><label>${t('app_price')} ($)</label>
                        <input type="number" id="f-price" min="0" step="0.01" value="${app?app.price:0}"></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>${t('version')}</label>
                        <input type="text" id="f-ver" value="${app?app.version||'1.0.0':'1.0.0'}"></div>
                        <div class="form-group"><label>${t('app_tags')}</label>
                        <input type="text" id="f-tags" value="${app&&app.tags?app.tags.join(', '):''}"></div>
                    </div>
                    <div class="form-group"><label>${t('app_desc_ar')} *</label>
                    <textarea id="f-desc-ar" required>${app?Security.escapeHtml(app.desc_ar||''):''}</textarea></div>
                    <div class="form-group"><label>${t('app_desc_en')}</label>
                    <textarea id="f-desc-en">${app?Security.escapeHtml(app.desc_en||''):''}</textarea></div>
                    <div class="form-row">
                        <div class="form-group"><label>${t('rating')} (0-5)</label>
                        <input type="number" id="f-rating" min="0" max="5" step="0.1" value="${app?app.rating||0:0}"></div>
                        <div class="form-group" style="display:flex;align-items:end;gap:16px;">
                            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
                                <div class="toggle-switch ${app&&app.featured?'active':''}" id="toggle-featured" onclick="this.classList.toggle('active')"></div>
                                ${t('featured')}
                            </label>
                            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
                                <div class="toggle-switch ${!app||app.active!==false?'active':''}" id="toggle-active" onclick="this.classList.toggle('active')"></div>
                                ${t('active')}
                            </label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>${t('icon')}</label>
                        <div style="display:flex;gap:16px;align-items:center;">

                        </div>
                    </div>
                    <div class="form-group">
                        <label>${t('file')}</label>

                            <div class="upload-hint">${t('file_types')}</div>
                        </div>

                                    <div class="preview-name">${app&&app.fileName?Security.escapeHtml(app.fileName):''}</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div style="display:flex;gap:12px;margin-top:24px;">

                        <button type="submit" class="btn-primary">💾 ${t('save')}</button>
                    </div>
                </form>
            </div>
        </div>
    `;
}

function handleIcon(e) {
    const file = e.target.files[0];
    if (!file) return;
    const errors = Security.validateUpload(file, 'image');
    if (errors.length > 0) { showToast(errors[0], 'error'); return; }
    const reader = new FileReader();
    reader.onload = ev => {
        uploadedIconData = ev.target.result;
        const prev = document.getElementById('icon-preview');
        prev.src = uploadedIconData;
        prev.classList.add('active');
    };
    reader.readAsDataURL(file);
}

function handleFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    const errors = Security.validateUpload(file, 'file');
    if (errors.length > 0) { showToast(errors[0], 'error'); return; }
    const reader = new FileReader();
    reader.onload = ev => {
        uploadedFileData = ev.target.result;
        document.getElementById('file-preview').style.display = 'block';
        document.querySelector('#file-preview .preview-name').textContent = file.name;
    };
    reader.readAsDataURL(file);
}

function saveAppForm(e, id) {
    e.preventDefault();
    const name = Security.sanitize(document.getElementById('f-name').value);
    if (!Security.validateName(name)) { showToast(currentLang==='ar'?'اسم غير صالح':'Invalid name','error'); return; }

    const price = parseFloat(document.getElementById('f-price').value);
    if (!Security.validatePrice(price)) { showToast(currentLang==='ar'?'سعر غير صالح':'Invalid price','error'); return; }

    const apps = Store.loadApps();
    const existing = id ? apps.find(a => a.id === id) : null;

    const appData = {
        id: id || Date.now(),
        name: name,
        developer: Security.sanitize(document.getElementById('f-dev').value),
        category: document.getElementById('f-cat').value,
        price: price,
        version: Security.sanitize(document.getElementById('f-ver').value),
        tags: document.getElementById('f-tags').value.split(',').map(t=>Security.sanitize(t.trim())).filter(Boolean),
        desc_ar: Security.sanitize(document.getElementById('f-desc-ar').value),
        desc_en: Security.sanitize(document.getElementById('f-desc-en').value),
        rating: parseFloat(document.getElementById('f-rating').value) || 0,
        featured: document.getElementById('toggle-featured').classList.contains('active'),
        active: document.getElementById('toggle-active').classList.contains('active'),
        icon: existing ? existing.icon : '📱',
        iconData: uploadedIconData || (existing ? existing.iconData : null),
        fileData: uploadedFileData || (existing ? existing.fileData : null),
        fileName: uploadedFileData ? document.querySelector('#file-preview .preview-name').textContent : (existing ? existing.fileName : null),
        downloads: existing ? existing.downloads : 0,
        size: existing ? existing.size : 'N/A',
        updated: new Date().toISOString().split('T')[0]
    };

    Store.saveApp(appData);
    closeModal();
    showToast(t('saved'), 'success');
    renderApps();
}

        storeNameEn: Security.sanitize(document.getElementById('s-name-en').value),
        supportEmail: document.getElementById('s-email').value,
        currency: document.getElementById('s-currency').value,
        currencySymbol: { USD:'$', EUR:'€', SAR:'ر.س', EGP:'ج.م', AED:'د.إ' }[document.getElementById('s-currency').value] || '$',
        primaryColor: document.getElementById('s-color').value,
        maxFileSize: parseInt(document.getElementById('s-maxfile').value) || 50,
        maxImageSize: parseInt(document.getElementById('s-maximg').value) || 2,
        allowRegistration: document.getElementById('s-register').classList.contains('active'),
        maintenanceMode: document.getElementById('s-maintenance').classList.contains('active'),
        announcement: Security.sanitize(document.getElementById('s-announce').value),
        announcementActive: document.getElementById('s-announce-active').classList.contains('active'),
        footerText: Security.sanitize(document.getElementById('s-footer').value)
    };
    Store.saveSettings(settings);
    showToast(t('settings_saved'),'success');
}

// === 9. الأمان ===
function renderSecurity() {
    const logs = JSON.parse(localStorage.getItem('securityLogs') || '[]').reverse();
    document.getElementById('content').innerHTML = `
        <div class="section-card">
            <h3>🔒 معلومات الأمان</h3>
            <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;">
                <div><strong>الحالة:</strong> <span class="badge badge-active">محمي ✅</span></div>
                <div><strong>منع XSS:</strong> <span class="badge badge-active">مفعّل ✅</span></div>
                <div><strong>التحقق من المدخلات:</strong> <span class="badge badge-active">مفعّل ✅</span></div>
                <div><strong>انتهاء الجلسة:</strong> <span class="badge badge-active">30 دقيقة ✅</span></div>
                <div><strong>تشفير كلمات المرور:</strong> <span class="badge badge-active">SHA-256 ✅</span></div>
                <div><strong>التحقق من الملفات:</strong> <span class="badge badge-active">مفعّل ✅</span></div>
            </div>
        </div>
        <div class="admin-table">
            <table><thead><tr><th>${t('event')}</th><th>${t('user')}</th><th>${t('time')}</th></tr></thead>
            <tbody>${logs.length > 0 ? logs.map(l => `
                <tr>
                    <td><span class="badge badge-inactive">${Security.escapeHtml(l.type)}</span> ${Security.escapeHtml(l.detail||'')}</td>
                    <td>-</td>
                    <td>${l.timestamp ? new Date(l.timestamp).toLocaleString() : '-'}</td>
                </tr>
            `).join('') : `<tr><td colspan="3" style="text-align:center;padding:40px;color:var(--text-secondary);">${t('no_logs')}</td></tr>`}</tbody></table>
        </div>
    `;
}

// === 10. البيانات ===
function renderData() {
    document.getElementById('content').innerHTML = `
        <div class="section-card">
            <h3>💾 تصدير البيانات</h3>
            <p style="color:var(--text-secondary);margin-bottom:16px;">صدّر كل بيانات المتجر (تطبيقات، فئات، كوبونات، مستخدمون، إعدادات) كملف JSON.</p>
            <button class="btn-primary" style="width:auto;padding:14px 28px;" onclick="exportData()">📥 ${t('export_data')}</button>
        </div>
        <div class="section-card">
            <h3>📥 استيراد البيانات</h3>
            <p style="color:var(--text-secondary);margin-bottom:16px;">استورد بيانات من ملف JSON.</p>
            <input type="file" accept=".json" onchange="importData(event)" style="padding:14px;border:1.5px dashed var(--border);border-radius:12px;width:100%;">
        </div>
        <div class="section-card" style="border-color:var(--error);">
            <h3 style="color:var(--error);">⚠️ منطقة الخطر</h3>
            <p style="color:var(--text-secondary);margin-bottom:16px;">حذف كل البيانات وإعادة المتجر لحالته الأصلية. لا يمكن التراجع!</p>
            <button class="btn-danger" onclick="resetData()">🗑️ ${t('reset_data')}</button>
        </div>
    `;
}

function exportData() {
    const data = Store.exportAll();
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'app-store-backup-' + new Date().toISOString().split('T')[0] + '.json';
    a.click();
    URL.revokeObjectURL(url);
    showToast(t('export_success'),'success');
}

function importData(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
        try {
            const data = JSON.parse(ev.target.result);
            Store.importAll(data);
            showToast(t('import_success'),'success');
            showSection('dashboard', null);
        } catch (err) {
            showToast('ملف غير صالح','error');
        }
    };
    reader.readAsText(file);
}

function resetData() {
    if (!confirm(t('confirm_reset'))) return;
    if (!confirm('⚠️ تأكيد أخير! سيتم حذف كل شيء!')) return;
    Store.resetAll();
    Security.clearSession();
    showToast('تم إعادة التعيين','success');
    setTimeout(() => window.location.href = 'index.html', 1500);
}

// === بدء التشغيل ===
renderDashboard();
</script>
